name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Job-level so it's already set during `npm ci`'s postinstall step
      # (which syncs tsconfig.json's @eml/* paths) — not just the later
      # build/test steps.
      EML_REPO: ${{ github.workspace }}/eml-core
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Checkout EML language repo
        uses: actions/checkout@v4
        with:
          repository: kakon77777-commits/efficientnewlanguage
          path: eml-core

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Build (typecheck happens separately; this runs corpus + vite + worker + verify-dist)
        run: npm run build

      - run: npx tsc --noEmit

      - name: Worker smoke tests
        run: npm run test:worker

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # --ignore-scripts: this job only needs the pinned `wrangler` binary from
      # node_modules — it never checks out eml-core, so the postinstall
      # tsconfig sync (which needs EML_REPO) would fail here otherwise.
      - run: npm ci --ignore-scripts

      - name: Download dist artifact (deploy the exact artifact build verified — don't rebuild)
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          OUTPUT=$(npx wrangler pages deploy dist --project-name=neokpolaris --branch="$BRANCH" --commit-dirty=true)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oE 'https://[a-z0-9]+\.neokpolaris\.pages\.dev' | head -1)
          if [ -z "$URL" ]; then
            echo "::error::Could not parse deployment URL from wrangler output"
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Smoke test the deployed URL
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "Smoke testing $URL"
          fail=0
          for path in / /app /docs /cases /healthz /readyz /version; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$URL$path")
            if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
              echo "::error::$path returned HTTP $code"
              fail=1
            else
              echo "$path -> $code"
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::Smoke test failed — see above"
            exit 1
          fi
